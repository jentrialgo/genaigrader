name: CI

on:
  pull_request:
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dev dependencies
        run: ~/.local/bin/uv sync --group dev

      - name: Run pre-commit hooks
        run: ~/.local/bin/uv run pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    needs: quality
    env:
      DJANGO_SETTINGS_MODULE: mi_web.settings
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: ~/.local/bin/uv sync

      - name: Run Django check
        run: ~/.local/bin/uv run python manage.py check

      - name: Run migrations
        run: ~/.local/bin/uv run python manage.py migrate

      - name: Run tests
        run: ~/.local/bin/uv run python manage.py test

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: genaigrader:${{ github.sha }}
