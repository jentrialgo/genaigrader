services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-genaigrader}
      - POSTGRES_USER=${POSTGRES_USER:-genai_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-genai_user} -d ${POSTGRES_DB:-genaigrader}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    volumes:
      - uploaded_files_data:/app/uploaded_files
      - staticfiles_data:/app/staticfiles

volumes:
  postgres_data:
  uploaded_files_data:
  staticfiles_data:

