services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - UV_LINK_MODE=copy
      - DJANGO_DEBUG=1
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
      - /app/.venv
    command: uv run manage.py runserver 0.0.0.0:8000

  ollama:
    image: ollama/ollama:latest
    container_name: genaigrader-ollama
    volumes:
      - ollama_data:/root/.ollama
    # NOTE: By default, this runs on CPU. To enable GPU acceleration, you MUST install the NVIDIA Container Toolkit on your host. Once installed, uncomment the deploy block below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_data:
